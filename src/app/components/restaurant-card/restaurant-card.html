<div class="restau-card">
    <h3>{{restaurant().name}}</h3>
    <p>{{restaurant().district}}</p>
    <p>{{restaurant().specialty}}</p>
    
    <app-star-rating (ratingChanged)="ratingChanged($event)" [currentRating]="restaurant().currentRating"></app-star-rating>
    @if (restaurant().currentRating > 0) {
        <p class="rating-text">{{restaurant().currentRating}}/5</p>
    }@else {
        <p class="no-rating">Cliquez !</p>
    }
</div>
